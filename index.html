    <section class="workspace-showcase" aria-label="健身场景展示">
      <h2 class="workspace-showcase-title">健身场景展示</h2>
      <div class="workspace-grid">
        <div class="workspace-video-card">
          <video class="workspace-video" src="videos/生成人物健身循环视频.mp4" autoplay loop muted playsinline preload="auto" aria-label="健身动作演示 1"></video>
        </div>
        <div class="workspace-video-card">
          <video class="workspace-video" src="videos/生成人物健身循环视频 (2).mp4" autoplay loop muted playsinline preload="auto" aria-label="健身动作演示 2"></video>
        </div>
        <div class="workspace-video-card">
          <video class="workspace-video" src="videos/生成人物健身循环视频 (3).mp4" autoplay loop muted playsinline preload="auto" aria-label="健身动作演示 3"></video>
        </div>
        <div class="workspace-video-card">
          <video class="workspace-video" src="videos/生成人物健身循环视频 (4).mp4" autoplay loop muted playsinline preload="auto" aria-label="健身动作演示 4"></video>
        </div>

          <video class="workspace-video" src="videos/生成人物健身循环视频 (5).mp4" autoplay loop muted playsinline preload="auto" aria-label="健身动作演示 5"></video>

  </main>

  <div class="auth-modal" id="auth-modal" aria-hidden="true">
    <div class="auth-card" role="dialog" aria-modal="true" aria-labelledby="auth-title">
      <button type="button" class="auth-close" id="auth-close-btn" aria-label="关闭">×</button>
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" id="auth-tab-login">登录</button>
        <button type="button" class="auth-tab" id="auth-tab-register">注册</button>
      </div>
      <div class="auth-body">
        <div class="auth-message" id="auth-message"></div>
        <form id="login-form" class="auth-form active">
          <label>用户名</label>
          <input type="text" id="login-username" required placeholder="请输入用户名" />
          <label>密码</label>
          <input type="password" id="login-password" required placeholder="请输入密码" />
          <button type="submit" class="btn btn-primary">登录</button>
        </form>
        <form id="register-form" class="auth-form">
          <label>昵称</label>
          <input type="text" id="register-username" required placeholder="请输入昵称" />
          <label>身高</label>
          <input type="number" id="register-height" required placeholder="请输入身高" />
          <label>体重</label>
          <input type="number" id="register-weight" required placeholder="请输入体重" />
          <label>密码</label>
          <input type="password" id="register-password" required placeholder="请输入密码" />
          <button type="submit" class="btn btn-primary">注册</button>
        </form>
      </div>
    </div>
  </div>

  <script src="joining.js"></script>

  <script src="ai_chat_widget.js"></script>

    apiKey: '56982804a0c240ec85082e5e8d148d3d.7qUhn1d74wth7GAB',   // 必填
    model: 'glm-4-flashx-250414',                // 可选
    temperature: 1,                  // 可选
    systemMessage: '你是一个健身教练,需要对用户的问题作出专业解答但要易于理解。'  // 可选系统提示
  });
</script>
